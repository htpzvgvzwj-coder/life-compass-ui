    <div class="onboarding-layer" id="onboarding-layer" aria-hidden="true">
      <section class="onboarding-card" role="dialog" aria-modal="true" aria-labelledby="onboarding-title">
        <p class="eyebrow">Google account sign-in</p>
        <h2 id="onboarding-title">Welcome to Compass</h2>
        <p class="muted">Use a Gmail address to create your mobile web account. Admin access requires the demo admin passcode.</p>
        <form id="onboarding-form" class="username-form">
          <label>
            Gmail address
            <input id="auth-email" type="email" autocomplete="email" placeholder="you@gmail.com">
          </label>
          <label>
            Username
            <input id="onboarding-username" type="text" maxlength="18" autocomplete="nickname" placeholder="Example: Aina">
          </label>
          <label>
            Admin passcode optional
            <input id="auth-admin-pass" type="password" autocomplete="off" placeholder="Only for admins">
          </label>
          <p class="tiny-note">Prototype note: this simulates Google Sign-In locally. Production needs Google Identity Services and server-side token verification.</p>
          <p class="form-error" id="onboarding-error" aria-live="polite"></p>
          <button class="primary-action" type="submit">Continue with Google</button>
        </form>
      </section>
